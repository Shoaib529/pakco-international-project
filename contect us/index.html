<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - PAKCO INTERNATIONAL</title>
    <link rel="stylesheet" href="stylesheet.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="top-bar">
      <div class="container flex-row">
        <div class="top-left">
          <span><i class="fas fa-phone"></i> +92 300 6360 209</span>
        </div>
        <div class="top-right">
          <a href="#"><i class="fab fa-facebook"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
      </div>
    </div>

    <div class="page-title-section">
      <div class="container">
        <h1>Contact Us</h1>
        <div class="brand-name">PAKCO INTERNATIONAL</div>
      </div>
    </div>

    <main class="container">
      <div class="contact-grid">
        <div class="contact-form-side">
          <form>
            <input type="text" placeholder="Your Name" required />
            <input type="email" placeholder="Your Email" required />
            <input type="text" placeholder="Subject" />
            <textarea rows="6" placeholder="Your Message"></textarea>
            <button type="submit">SEND MESSAGE</button>
          </form>
        </div>

        <div class="contact-details-side">
          <div class="detail-box">
            <h3>Address</h3>
            <p>Sialkot, Punjab, Pakistan</p>
          </div>
          <div class="detail-box">
            <h3>Phone</h3>
            <p>+92 300 6360 209</p>
          </div>
          <div class="detail-box">
            <h3>Email</h3>
            <p>info@pakcointernational.com</p>
          </div>
        </div>
      </div>

      <div class="map-section">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3370.528394467554!2d74.5298!3d32.4945!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzLCsDI5JzQwLjIiTiA3NMKwMzEnNDcuMyJF!5e0!3m2!1sen!2spk!4v1640000000000"
          width="100%"
          height="400"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
        ></iframe>
      </div>
    </main>

    <footer class="site-footer">
      <p>© 2026 PAKCO INTERNATIONAL</p>
    </footer>
  </body>
</html>
